<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: 'Segoe UI', sans-serif;
      background:#f4f6fb;
    }

    /* NAVBAR */
    .nav {
      display:flex;
      justify-content: space-between;
      padding:15px 20px;
      background:#4a67ff;
      color:white;
      align-items:center;
    }

    .nav h2 { margin:0; font-size:18px; }

    .nav button {
      background:white;
      border:none;
      padding:6px 12px;
      border-radius:6px;
      cursor:pointer;
    }

    /* MAIN CONTAINER */
    .container {
      padding:20px;
      max-width:900px;
      margin:auto;
    }

    /* CARD */
    .card {
      background:white;
      border-radius:12px;
      padding:20px;
      margin-bottom:20px;
      box-shadow:0 5px 20px rgba(0,0,0,0.1);
    }

    h3 { margin-top:0; }

    input, textarea {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button.primary {
      width:100%;
      margin-top:10px;
      padding:12px;
      background:#4a67ff;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    /* GROUP LIST */
    .group {
      border:1px solid #ddd;
      padding:15px;
      border-radius:10px;
      margin-top:10px;
    }

    .group button {
      margin-top:10px;
      padding:8px;
      background:#4a67ff;
      color:white;
      border:none;
      border-radius:6px;
    }

    .full {
      background:#ffe8e8;
    }

    /* SECTIONS */
    .section { display:none; }
    .active { display:block; }

    /* LOGIN PAGE */
    #loginPage {
      display:flex;
      height:100vh;
      align-items:center;
      justify-content:center;
    }

    .login-box {
      width:320px;
      background:white;
      padding:25px;
      border-radius:12px;
      box-shadow:0 10px 30px rgba(0,0,0,0.15);
    }

  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div id="loginPage">

  <div class="login-box">
    <h3>🔐 Login</h3>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button class="primary" onclick="loginUser()">Login</button>

    <p id="msg"></p>

    <hr>

    <h4>Register</h4>
    <input id="newUser" placeholder="Username">
    <input id="newPass" type="password" placeholder="Password">

    <button class="primary" onclick="registerUser()">Create Account</button>

  </div>

</div>

<!-- MAIN SYSTEM -->
<div id="system" style="display:none;">

  <!-- NAVBAR -->
  <div class="nav">
    <h2>📚 Study Finder</h2>

    <div>
      <button onclick="showSection('dashboard')">Dashboard</button>
      <button onclick="showSection('groups')">Groups</button>
      <button onclick="showSection('profile')">Profile</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active card">
      <h3>📊 Dashboard</h3>
      <p>Total Groups: <span id="totalGroups"></span></p>
      <p>Total Members: <span id="totalMembers"></span></p>
    </div>

    <!-- CREATE GROUP -->
    <div id="groups" class="section">

      <div class="card">
        <h3>Create Group</h3>

        <input id="name" placeholder="Your Name">
        <input id="subject" placeholder="Subject">
        <input id="topic" placeholder="Topic">
        <textarea id="desc"></textarea>
        <input id="contact" placeholder="WhatsApp">
        <input id="max" placeholder="Max Members">

        <button class="primary" onclick="create()">Create Group</button>
      </div>

      <div class="card">
        <h3>🔍 Find Groups</h3>
        <input id="search" placeholder="Search..." onkeyup="filter()">
        <div id="list"></div>
      </div>

    </div>

    <!-- PROFILE -->
    <div id="profile" class="section card">
      <h3>👤 Profile</h3>
      <p>Username: <span id="profileName"></span></p>
      <p>Role: <span id="profileRole"></span></p>
    </div>

  </div>

</div>

<script>

let groups = [];

// ✅ LOGIN
function loginUser(){

  google.script.run.withSuccessHandler(function(res){

    if(res.status=="success"){

      localStorage.setItem("user", user.value);
      localStorage.setItem("role", res.role);

      loginPage.style.display="none";
      system.style.display="block";

      profileName.innerText = user.value;
      profileRole.innerText = res.role;

      load();

    } else {
      msg.innerText="Invalid login";
    }

  }).login(user.value, pass.value);
}

// ✅ AUTO LOGIN
window.onload = function(){

  let u = localStorage.getItem("user");

  if(u){
    loginPage.style.display="none";
    system.style.display="block";

    profileName.innerText = u;
    profileRole.innerText = localStorage.getItem("role");

    load();
  }
}

// ✅ LOGOUT
function logout(){
  localStorage.clear();
  location.reload();
}

// ✅ REGISTER
function registerUser(){
  google.script.run.withSuccessHandler(alert)
    .register(newUser.value,newPass.value);
}

// ✅ LOAD GROUPS
function load(){
  google.script.run.withSuccessHandler(function(res){
    groups=res;
    display(res);
    dashboard();
  }).getGroups();
}

// ✅ DISPLAY
function display(data){

  let html="";

  data.slice(1).forEach(r=>{

    let full = r[8]=="Full" ? "full" : "";

    html+=`
      <div class="group ${full}">
        <b>${r[2]}</b> (${r[0]})<br>
        Members: ${r[7]}/${r[6]}<br>
        Status: ${r[8]}
        <button onclick="join('${r[0]}')">Join</button>
      </div>
    `;
  });

  list.innerHTML=html;
}

// ✅ SEARCH
function filter(){
  let k=search.value.toLowerCase();
  display(groups.filter(r=>r[2].toLowerCase().includes(k)));
}

// ✅ JOIN
function join(id){
  let name=prompt("Your name");
  if(name){
    google.script.run.withSuccessHandler(alert)
      .joinGroup(id,name);
  }
}

// ✅ CREATE
function create(){

  const data={
    name:name.value,
    subject:subject.value,
    topic:topic.value,
    description:desc.value,
    contact:contact.value,
    maxMembers:max.value
  };

  google.script.run.withSuccessHandler(alert)
    .createGroup(data);
}

// ✅ DASHBOARD
function dashboard(){

  let total = groups.length - 1;
  let members = 0;

  groups.slice(1).forEach(g=>{
    members += Number(g[7]);
  });

  totalGroups.innerText = total;
  totalMembers.innerText = members;
}

// ✅ NAVIGATION
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

</script>

</body>
</html>
