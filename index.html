<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Circle</title>
<meta name="description" content="Study Circle — find or start a study group in minutes.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     CONFIG
     Replace this with your deployed Apps Script /exec URL.
     Everything else on this page reads from this one constant.
     ============================================================ */
</style>
<script>
  const APP_URL = "https://script.google.com/macros/s/AKfycbzPQMRgmEf0oaGQVhpnWzPg7-Tf1zljE1j6t7At36lWPPw9fQPuIB_t48RlNTMuPA5hUQ/exec"; // e.g. https://script.google.com/macros/s/AKfycb.../exec
</script>
<style>
  :root{
    --ink-900:#1E1B4B;
    --violet-600:#7C3AED;
    --violet-500:#8B5CF6;
    --violet-100:#EDE9FE;
    --amber-500:#F59E0B;
    --slate-600:#52607A;
    --slate-200:#E2E8F0;
    --paper:#FAFAFC;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:var(--font-body);
    background:
      radial-gradient(900px 500px at 85% -10%, rgba(124,58,237,0.20), transparent 60%),
      radial-gradient(700px 500px at 0% 10%, rgba(245,158,11,0.12), transparent 55%),
      linear-gradient(180deg, var(--ink-900) 0%, #2A2566 55%, #342C7C 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    color:white;
  }
  .card{
    background:white;
    color:var(--ink-900);
    width:100%;
    max-width:460px;
    border-radius:24px;
    padding:44px 38px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,0.45);
    text-align:center;
  }
  .mark{
    width:52px; height:52px; border-radius:14px;
    background:linear-gradient(135deg, var(--violet-600), var(--ink-900));
    color:white;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:20px;
    transform:rotate(-6deg);
    margin:0 auto 20px;
    box-shadow:0 8px 20px -4px rgba(124,58,237,0.5);
  }
  h1{
    font-family:var(--font-display);
    font-size:25px;
    margin-bottom:10px;
    letter-spacing:-0.01em;
  }
  p.lede{
    color:var(--slate-600);
    font-size:15px;
    line-height:1.6;
    margin-bottom:28px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    width:100%;
    padding:15px 24px;
    border-radius:12px;
    font-weight:700;
    font-size:15.5px;
    text-decoration:none;
    background:linear-gradient(135deg, var(--amber-500), #FBBF24);
    color:var(--ink-900);
    box-shadow:0 10px 24px -6px rgba(245,158,11,0.45);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{ transform:translateY(-2px); box-shadow:0 14px 28px -6px rgba(245,158,11,0.55); }
  .btn:active{ transform:translateY(0); }
  .status{
    margin-top:18px;
    font-size:13px;
    color:#94A3B8;
    min-height:18px;
  }
  .status.warn{ color:#B45309; }
  .divider{
    height:1px;
    background:var(--slate-200);
    margin:26px 0 20px;
  }
  .footnote{
    font-size:12.5px;
    color:#94A3B8;
  }
  .footnote a{ color:var(--violet-600); font-weight:600; text-decoration:none; }
  .footnote a:hover{ text-decoration:underline; }
  noscript .btn{ background:var(--violet-100); }
</style>
</head>
<body>

  <div class="card">
    <div class="mark">SC</div>
    <h1>Study Circle</h1>
    <p class="lede">The dashboard lives inside Google — tap below and it opens in a new tab.</p>

    <a class="btn" id="launchBtn" href="#" target="_blank" rel="noopener">Open Study Circle →</a>

    <div class="status" id="statusMsg"></div>

    <div class="divider"></div>
    <p class="footnote">Hosted on Google Apps Script. This page is just a doorway —<br>
      <a href="#" id="directLink" target="_blank" rel="noopener">view the direct link</a>
    </p>
  </div>

<script>
  const launchBtn = document.getElementById('launchBtn');
  const directLink = document.getElementById('directLink');
  const statusMsg = document.getElementById('statusMsg');

  const isConfigured = APP_URL && !APP_URL.startsWith('PASTE_');

  if (isConfigured) {
    launchBtn.href = APP_URL;
    directLink.href = APP_URL;
    directLink.textContent = APP_URL;
  } else {
    launchBtn.removeAttribute('href');
    launchBtn.style.opacity = '0.5';
    launchBtn.style.cursor = 'not-allowed';
    launchBtn.addEventListener('click', (e) => e.preventDefault());
    directLink.removeAttribute('href');
    directLink.textContent = '(link not set yet)';
    statusMsg.textContent = 'Site owner: set APP_URL in the page source to activate this button.';
    statusMsg.classList.add('warn');
  }
</script>

</body>
</html>
